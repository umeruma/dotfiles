# Cross-platform [dotfiles] allowlist, loaded via `env = ["dotfiles"]`
# in .miserc.toml (merged with mise.toml). macOS-only entries live in
# mise.macos.toml. Applied by `mise dotfiles apply` / `mise bootstrap`.
# Dirs that receive runtime writes (logs, state) get per-file entries
# so app state stays out of the repo.

[dotfiles]
# shell / git
"~/.zshenv" = { source = "home/.zshenv", mode = "symlink" }
"~/.zprofile" = { source = "home/.zprofile", mode = "symlink" }
"~/.zshrc" = { source = "home/.zshrc", mode = "symlink" }
"~/.gitconfig" = { source = "home/.gitconfig", mode = "symlink" }
# static config dirs (whole-dir links; new repo files show up automatically)
"~/.config/doom" = { source = "home/.config/doom", mode = "symlink" }
"~/.config/ghostty" = { source = "home/.config/ghostty", mode = "symlink" }
"~/.config/sheldon" = { source = "home/.config/sheldon", mode = "symlink" }
# runtime-write dirs: per-file links only
"~/.config/lazygit/config.yml" = { source = "home/.config/lazygit/config.yml", mode = "symlink" }
"~/.config/micro/bindings.json" = { source = "home/.config/micro/bindings.json", mode = "symlink" }
"~/.config/micro/plug/editorconfig" = { source = "home/.config/micro/plug/editorconfig", mode = "symlink" }
# AI agents — single source of truth: home/.agents.
# ~/.agents is linked whole-dir on purpose: Cursor and Copilot read
# ~/.agents/skills natively, and skill installers (npx skills) write
# installed skills + .skill-lock.json through the link into the repo,
# so installs are tracked by git. Claude Code only reads
# ~/.claude/skills, so repo-authored skills get per-skill entries there.
"~/.agents" = { source = "home/.agents", mode = "symlink" }
"~/.claude/CLAUDE.md" = { source = "home/.claude/CLAUDE.md", mode = "symlink" }
"~/.copilot/instructions/global.instructions.md" = { source = "home/.agents/instructions/global.instructions.md", mode = "symlink" }
"~/.claude/skills/commit" = { source = "home/.agents/skills/commit", mode = "symlink" }
"~/.claude/skills/dev-server" = { source = "home/.agents/skills/dev-server", mode = "symlink" }
"~/.claude/skills/git-wt" = { source = "home/.agents/skills/git-wt", mode = "symlink" }
