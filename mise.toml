[settings]
# Required for `mise bootstrap` (packages, login shell, etc.)
experimental = true

[bootstrap.user]
login_shell = "/bin/zsh"

# Runs at the end of `mise bootstrap` (after packages / user / tools).
# On Unix `mise bootstrap` also applies [dotfiles] natively at step 3;
# running deploy again here is idempotent and keeps Windows covered.
[tasks.bootstrap]
description = "Deploy dotfiles ([dotfiles] on Unix, PSDotFiles on Windows)"
run = "mise run deploy"
run_windows = "mise run deploy"

[tasks.help]
description = "List available tasks"
run = "zsh script/help.zsh"
run_windows = "pwsh -NoProfile -Command \"Write-Host 'Task help is not supported on Windows.'; exit 1\""

[tasks.update]
description = "Fetch latest changes"
run = "zsh script/update.zsh"
run_windows = "pwsh -NoProfile -Command \"Write-Host 'Task update is not supported on Windows.'; exit 1\""

[tasks.list]
description = "Show dotfiles to deploy"
run = "mise dotfiles status"
run_windows = "pwsh -NoProfile -Command \"Write-Host 'Task list is not supported on Windows.'; exit 1\""

[tasks.clean]
description = "Remove deployed symlinks from $HOME"
run = "zsh script/clean.zsh"
run_windows = "pwsh -NoProfile -File script/clean-windows.ps1"

[tasks.prepare-subdirs]
description = "Ensure required subdirectories exist (Windows, from .deploy_subdir-windows)"
hide = true
run = "true"
run_windows = "pwsh -NoProfile -File script/prepare-subdirs-windows.ps1"

# `clean` runs first so entries removed from [dotfiles] don't leave
# stale links behind; apply then relinks everything in the allowlist.
[tasks.deploy]
description = "Deploy dotfiles to $HOME (mise [dotfiles] on Unix, PSDotFiles on Windows)"
depends = ["clean", "prepare-subdirs"]
run = "mise dotfiles apply -y"
run_windows = "pwsh -NoProfile -File script/deploy.ps1"

[tasks.install-apps]
description = "Install apps (Brewfile on Unix, win/apps.winget on Windows)"
run = "zsh script/install-apps.zsh"
run_windows = "pwsh -NoProfile -File script/install-apps.ps1"

[tasks.setup-kanata]
description = "Create kanata autostart shortcut (Windows)"
run = "echo 'Task setup-kanata is only supported on Windows.'; exit 1"
run_windows = "pwsh -NoProfile -File script/setup-kanata.ps1"

[tasks.theme]
description = "Install Terminal theme (macOS)"
run = "zsh script/theme.zsh"
run_windows = "pwsh -NoProfile -Command \"Write-Host 'Task theme is not supported on Windows.'; exit 1\""

[tasks.setup-doom]
description = "Install Doom Emacs core and sync packages"
run = "zsh script/setup-doom.zsh"
run_windows = "pwsh -NoProfile -Command \"Write-Host 'Task setup-doom is not supported on Windows.'; exit 1\""